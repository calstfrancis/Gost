<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!--
    Symbolic icon — uses currentColor so the shell theme recolors it.
    even-odd fill punches the inner void out of the document outline.
  -->

  <!-- Document outline with cutout interior -->
  <path fill-rule="evenodd" fill="currentColor"
    d="M 3 1
       C 2.45 1 2 1.45 2 2
       L 2 14
       C 2 14.55 2.45 15 3 15
       L 13 15
       C 13.55 15 14 14.55 14 14
       L 14 5.5
       L 10 1
       Z
       M 3 2 L 9.5 2 L 9.5 5.5 L 13 5.5 L 13 14 L 3 14 Z"/>

  <!-- Fold corner triangle (half-opacity so it reads lighter than the outline) -->
  <path fill="currentColor" opacity="0.45"
    d="M 10 1 L 14 5.5 L 10 5.5 Z"/>

  <!-- Header band (very subtle — suggests the blue title zone) -->
  <rect fill="currentColor" opacity="0.18"
    x="3" y="2" width="6.5" height="2.5" rx="0.75"/>

  <!-- Section/title heading line — full opacity, prominent -->
  <rect fill="currentColor"
    x="3.5" y="7.2" width="7" height="1.3" rx="0.65"/>

  <!-- Body text lines — progressively less opaque to imply depth -->
  <rect fill="currentColor" opacity="0.58"
    x="3.5" y="9.5" width="7" height="1" rx="0.5"/>
  <rect fill="currentColor" opacity="0.45"
    x="3.5" y="11.2" width="5" height="1" rx="0.5"/>
  <rect fill="currentColor" opacity="0.35"
    x="3.5" y="12.9" width="6" height="1" rx="0.5"/>
</svg>
