<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="docgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3584e4"/>
      <stop offset="100%" stop-color="#1c6cc9"/>
    </linearGradient>
    <linearGradient id="pagegrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <rect x="22" y="18" width="84" height="100" rx="8" fill="rgba(0,0,0,0.15)"/>

  <!-- Document body -->
  <rect x="18" y="14" width="84" height="100" rx="8" fill="url(#pagegrad)" stroke="#c0c0c0" stroke-width="1"/>

  <!-- Folded corner -->
  <polygon points="80,14 102,36 80,36" fill="#d0d0d0"/>
  <polygon points="80,14 102,14 102,36" fill="#e8e8e8"/>

  <!-- Blue accent bar top -->
  <rect x="18" y="14" width="84" height="12" rx="8" fill="url(#docgrad)"/>
  <rect x="18" y="20" width="84" height="6" fill="url(#docgrad)"/>

  <!-- Title line -->
  <rect x="30" y="40" width="52" height="5" rx="2.5" fill="#3584e4" opacity="0.9"/>

  <!-- Author line -->
  <rect x="36" y="50" width="40" height="3.5" rx="1.75" fill="#888" opacity="0.7"/>

  <!-- Rule -->
  <rect x="28" y="58" width="56" height="1" fill="#3584e4" opacity="0.3"/>

  <!-- Text lines -->
  <rect x="28" y="64" width="56" height="3" rx="1.5" fill="#555" opacity="0.5"/>
  <rect x="28" y="71" width="56" height="3" rx="1.5" fill="#555" opacity="0.5"/>
  <rect x="28" y="78" width="44" height="3" rx="1.5" fill="#555" opacity="0.5"/>

  <!-- Section heading -->
  <rect x="28" y="88" width="36" height="3.5" rx="1.75" fill="#3584e4" opacity="0.7"/>

  <!-- More text -->
  <rect x="28" y="96" width="56" height="3" rx="1.5" fill="#555" opacity="0.5"/>
  <rect x="28" y="103" width="48" height="3" rx="1.5" fill="#555" opacity="0.5"/>
</svg>
